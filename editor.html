<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDM Nod - Level Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div id="editor">
    <header class="editor-header">
      <h1>EDM Nod - Level Editor</h1>
      <div class="header-actions">
        <span class="version">v1.3</span>
        <button id="new-level" class="btn">New Level</button>
        <button id="export-level" class="btn btn-primary">Export Level</button>
      </div>
    </header>

    <div class="editor-sidebar">
      <div class="section">
        <h3>Level Info</h3>
        <div class="form-group">
          <label>Level ID</label>
          <input type="text" id="level-id" placeholder="my-level-1">
        </div>
        <div class="form-group">
          <label>Level Name</label>
          <input type="text" id="level-name" placeholder="My Level">
        </div>
        <div class="form-group">
          <label>BPM</label>
          <input type="number" id="level-bpm" placeholder="124" value="124">
        </div>
      </div>

      <div class="section">
        <h3>Audio Track</h3>
        <div class="form-group">
          <label>Import Audio (MP3/WAV)</label>
          <input type="file" id="audio-file" accept="audio/mp3,audio/wav,audio/mpeg">
          <div id="audio-info" class="info-text"></div>
        </div>
      </div>

      <div class="section">
        <h3>Playback</h3>
        <div class="playback-controls">
          <button id="play-pause" class="btn btn-large">▶ Play</button>
          <button id="stop" class="btn">■ Stop</button>
        </div>
        <div class="form-group">
          <label>Current Time: <span id="current-time">0.00s</span></label>
          <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
        </div>
      </div>

      <div class="section">
        <h3>Stats</h3>
        <div class="stats">
          <div class="stat-item">
            <span class="stat-label">Down Beats:</span>
            <span id="down-count" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Up Beats:</span>
            <span id="up-count" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Total:</span>
            <span id="total-count" class="stat-value">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Duration:</span>
            <span id="duration" class="stat-value">0.00s</span>
          </div>
        </div>
      </div>
    </div>

    <div class="editor-main">
      <div class="timeline-controls">
        <div class="zoom-controls">
          <button id="zoom-out" class="btn-icon">−</button>
          <span id="zoom-level">100%</span>
          <button id="zoom-in" class="btn-icon">+</button>
        </div>
        <div class="follow-controls">
          <label>
            <input type="checkbox" id="follow-playhead" checked>
            Follow Playhead
          </label>
        </div>
      </div>

      <div class="timeline-container">
        <!-- Ruler -->
        <div class="timeline-ruler">
          <canvas id="ruler-canvas"></canvas>
        </div>

        <!-- Audio Track -->
        <div class="timeline-track">
          <div class="track-header">
            <div class="track-label">Audio</div>
          </div>
          <div class="track-content">
            <canvas id="waveform-canvas"></canvas>
          </div>
        </div>

        <!-- Down Track -->
        <div class="timeline-track">
          <div class="track-header">
            <div class="track-label">Down ↓</div>
          </div>
          <div class="track-content beat-track" id="down-track" data-action="down">
            <canvas id="down-canvas"></canvas>
          </div>
        </div>

        <!-- Up Track -->
        <div class="timeline-track">
          <div class="track-header">
            <div class="track-label">Up ↑</div>
          </div>
          <div class="track-content beat-track" id="up-track" data-action="up">
            <canvas id="up-canvas"></canvas>
          </div>
        </div>

        <!-- Playhead -->
        <div id="playhead"></div>
      </div>
    </div>
  </div>

  <script src="editor.js"></script>
</body>
</html>
